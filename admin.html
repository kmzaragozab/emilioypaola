<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Confirmaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #a8956c;
            --dark-text: #2c2c2c;
            --text-color: #5a5a5a;
            --bg-light: #f5f0eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #e8e0d8 0%, #f5f0eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-title {
            font-family: 'Pinyon Script', cursive;
            font-size: 3rem;
            color: var(--dark-text);
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(168,149,108,0.3);
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }

        .dashboard {
            display: none;
            width: 100%;
            max-width: 1400px;
            padding: 40px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .dashboard-title {
            font-family: 'Pinyon Script', cursive;
            font-size: 3rem;
            color: var(--dark-text);
        }

        .logout-btn {
            padding: 12px 30px;
            background: rgba(168,149,108,0.2);
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--gold);
            color: white;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.1rem;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Chart */
        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Table */
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark-text);
        }

        .filter-btns {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid rgba(168,149,108,0.3);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-light);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--dark-text);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        tr:hover {
            background: rgba(168,149,108,0.05);
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-si {
            background: rgba(76,175,80,0.15);
            color: #2e7d32;
        }

        .badge-no {
            background: rgba(211,47,47,0.15);
            color: #c62828;
        }

        .badge-talvez {
            background: rgba(255,152,0,0.15);
            color: #ef6c00;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                padding: 20px;
            }

            .dashboard-header {
                flex-direction: column;
                gap: 20px;
            }

            .filter-btns {
                flex-wrap: wrap;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- ========== LOGIN ========== -->
    <div class="login-container" id="loginContainer">
        <h1 class="login-title">Admin Panel</h1>
        <input 
            type="password" 
            id="passwordInput" 
            class="login-input" 
            placeholder="Contraseña"
            onkeypress="if(event.key === 'Enter') login()"
        >
        <button class="login-btn" onclick="login()">Ingresar</button>
        <p class="error-msg" id="errorMsg">❌ Contraseña incorrecta</p>
    </div>

    <!-- ========== DASHBOARD ========== -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Confirmaciones de Boda</h1>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalConfirmaciones">-</div>
                <div class="stat-label">Total Respuestas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSi">-</div>
                <div class="stat-label">Confirmaron</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalNo">-</div>
                <div class="stat-label">No Asistirán</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalTalvez">-</div>
                <div class="stat-label">Indecisos</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <canvas id="confirmacionChart"></canvas>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <h2 class="table-title">Lista de Invitados</h2>
                <div class="filter-btns">
                    <button class="filter-btn active" onclick="filtrarTabla('todos')">Todos</button>
                    <button class="filter-btn" onclick="filtrarTabla('Sí')">Confirmados</button>
                    <button class="filter-btn" onclick="filtrarTabla('No')">No Asistirán</button>
                    <button class="filter-btn" onclick="filtrarTabla('Tal vez')">Indecisos</button>
                </div>
            </div>
            <div id="tableContent" class="loading">Cargando datos...</div>
        </div>
    </div>

    <script>
        const AIRTABLE_CONFIG = {
            token: 'pat77KJlazgv5pdsK.3d21bf15d9ec7d05bfe978414d8b1a96aed0e7148f871fe097dce3485744637d',
            baseId: 'appOJtoo2lWxQgLZO',
            tableId: 'tbla3NgPrYVJARqL6'
        };
        
        const PASSWORD_HASH = '3747fff9cc06c56d6c35c0cc95e6d5d37c52e22a198b47527614d8ea82f15390';

        let confirmaciones = [];
        let filtroActual = 'todos';

        async function login() {
            const input = document.getElementById('passwordInput');
            const password = input.value;
            
            // Hash de la contraseña ingresada
            const hash = await sha256(password);
            
            if (hash === PASSWORD_HASH) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                cargarDatos();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                input.value = '';
            }
        }

        function logout() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function sha256(str) {
            const buffer = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ========== CARGAR DATOS DE AIRTABLE ==========
        async function cargarDatos() {
            try {
                const url = `https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableId}`;
                
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_CONFIG.token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Transformar datos de Airtable al formato esperado
                confirmaciones = data.records.map(record => ({
                    nombre: record.fields.Nombre || '',
                    email: record.fields.Email || '',
                    telefono: record.fields.Telefono || '',
                    confirmacion: record.fields.Confirmacion || '',
                    invitados: record.fields.Invitados || 0,
                    mensaje: record.fields.Mensaje || ''
                }));
                
                mostrarEstadisticas();
                mostrarGrafica();
                mostrarTabla();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableContent').innerHTML = 
                    `<p style="color: #d32f2f; padding: 20px; text-align: center;">
                        ❌ Error al cargar datos de Airtable.<br>
                        <small>${error.message}</small><br><br>
                        <strong>Verifica:</strong><br>
                        • Que el token sea válido<br>
                        • Que los IDs de base y tabla sean correctos<br>
                        • Que los nombres de campos coincidan (Nombre, Email, etc.)
                    </p>`;
            }
        }

        // ========== ESTADÍSTICAS ==========
        function mostrarEstadisticas() {
            const si = confirmaciones.filter(c => c.confirmacion === 'Sí').length;
            const no = confirmaciones.filter(c => c.confirmacion === 'No').length;
            const talvez = confirmaciones.filter(c => c.confirmacion === 'Tal vez').length;
            
            document.getElementById('totalConfirmaciones').textContent = confirmaciones.length;
            document.getElementById('totalSi').textContent = si;
            document.getElementById('totalNo').textContent = no;
            document.getElementById('totalTalvez').textContent = talvez;
        }

        // ========== GRÁFICA ==========
        function mostrarGrafica() {
            const si = confirmaciones.filter(c => c.confirmacion === 'Sí').length;
            const no = confirmaciones.filter(c => c.confirmacion === 'No').length;
            const talvez = confirmaciones.filter(c => c.confirmacion === 'Tal vez').length;

            const ctx = document.getElementById('confirmacionChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Confirmados', 'No Asistirán', 'Indecisos'],
                    datasets: [{
                        data: [si, no, talvez],
                        backgroundColor: [
                            'rgba(76, 175, 80, 0.8)',
                            'rgba(211, 47, 47, 0.8)',
                            'rgba(255, 152, 0, 0.8)'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: {
                                    size: 14,
                                    family: 'Cormorant Garamond'
                                }
                            }
                        }
                    }
                }
            });
        }

        // ========== TABLA ==========
        function mostrarTabla() {
            const datos = filtroActual === 'todos' 
                ? confirmaciones 
                : confirmaciones.filter(c => c.confirmacion === filtroActual);

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Teléfono</th>
                            <th>Confirmación</th>
                            <th>Acompañantes</th>
                            <th>Mensaje</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            datos.forEach(c => {
                const badgeClass = 
                    c.confirmacion === 'Sí' ? 'badge-si' :
                    c.confirmacion === 'No' ? 'badge-no' : 'badge-talvez';

                html += `
                    <tr>
                        <td><strong>${c.nombre}</strong></td>
                        <td>${c.email}</td>
                        <td>${c.telefono || '-'}</td>
                        <td><span class="badge ${badgeClass}">${c.confirmacion}</span></td>
                        <td>${c.invitados || 0}</td>
                        <td>${c.mensaje || '-'}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;
        }

        function filtrarTabla(filtro) {
            filtroActual = filtro;
            
            // Actualizar botones activos
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            mostrarTabla();
        }
    </script>
</body>
</html>
